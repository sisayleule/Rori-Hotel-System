<!DOCTYPE html> <!-- Standard declaration defining this file as an HTML5 document structure -->
<html lang="en"> <!-- Root element setting the primary document language to English -->
  <head> <!-- Head element hosting meta descriptors, styles, links and CDN script loaders -->
    <meta charset="UTF-8" /> <!-- Inform browsers to parse and render using UTF-8 Unicode characters encoding -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" /> <!-- Register standard vector app favicon image -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Enable fluent mobile scales by aligning viewport widths with actual device pixel counts -->
    <title>Rori Hotel Internship System</title> <!-- Set the official page browser title text -->

    <!-- Load Google Fonts Playfair Display (weights 400, 700) and Inter (weights 300, 400, 500) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

    <!-- External script loading Vanilla Tilt from CDN to support sleek 3D perspective mouse hover hover effects on UI cards -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
  </head> <!-- Close metadata head parameters segment -->
  <body> <!-- Body elements containing the visible layout structures of our React applet -->
    <div id="root"></div> <!-- Entry point container div where the main Vite React app will mount -->
    <script type="module" src="/src/main.jsx"></script> <!-- Load the ES6 module script to launch React -->
  </body> <!-- Close visible layout body scope -->
</html> <!-- End of main HTML5 markup container tags -->
