name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            rori-hotel/client/package-lock.json
            rori-hotel/server/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: rori-hotel/server

      - name: Check server syntax
        run: npm run lint
        working-directory: rori-hotel/server

      - name: Install client dependencies
        run: npm ci
        working-directory: rori-hotel/client

      - name: Build client
        run: npm run build
        working-directory: rori-hotel/client
